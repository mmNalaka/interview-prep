<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Prep</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;

            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        }

            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .content {
            margin-top: 20px;
        }
        p {
            color: #555;
            line-height: 1.8;
        }

<body>
    <div class="container">
        <h1>🚀 Interview Prep</h1>
        <p class="subtitle">Your personal interview preparation repository</p>
        <div class="content">
